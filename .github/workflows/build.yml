name: Build Binaries

on:
  push:
    tags: ['[0-9]*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Linux x86_64 ──────────────────────────────────────────────────
  linux-x86_64:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        php: ['8.4', '8.5']
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglfw3-dev \
            glslang-dev \
            libvulkan-dev \
            libavcodec-dev libavformat-dev libavutil-dev libswscale-dev \
            spirv-cross libspirv-cross-c-shared-dev \
            pkg-config

      - name: Build extension
        run: |
          phpize
          ./configure \
            --enable-vio \
            --with-glfw \
            --with-glslang \
            --with-spirv-cross \
            --with-vulkan \
            --with-ffmpeg
          make -j$(nproc)

      - name: Run tests
        run: |
          NO_INTERACTION=1 TEST_PHP_EXECUTABLE=$(which php) \
            php run-tests.php -d extension=$PWD/modules/vio.so tests/ || true

      - name: Package binary
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}"
          strip modules/vio.so
          # PIE format: php_vio-{version}_php{phpver}-{arch}-{os}-{libc}.zip
          cd modules
          zip "../php_vio-${VERSION}_php${{ matrix.php }}-x86_64-linux-glibc.zip" vio.so

      - uses: actions/upload-artifact@v4
        with:
          name: vio-linux-x86_64-php${{ matrix.php }}
          path: php_vio-*_php${{ matrix.php }}-x86_64-linux-glibc.zip

  # ── Linux aarch64 ─────────────────────────────────────────────────
  linux-aarch64:
    runs-on: ubuntu-24.04-arm
    strategy:
      matrix:
        php: ['8.4', '8.5']
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglfw3-dev \
            glslang-dev \
            libvulkan-dev \
            libavcodec-dev libavformat-dev libavutil-dev libswscale-dev \
            spirv-cross libspirv-cross-c-shared-dev \
            pkg-config

      - name: Build extension
        run: |
          phpize
          ./configure \
            --enable-vio \
            --with-glfw \
            --with-glslang \
            --with-spirv-cross \
            --with-vulkan \
            --with-ffmpeg
          make -j$(nproc)

      - name: Package binary
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}"
          strip modules/vio.so
          cd modules
          zip "../php_vio-${VERSION}_php${{ matrix.php }}-arm64-linux-glibc.zip" vio.so

      - uses: actions/upload-artifact@v4
        with:
          name: vio-linux-aarch64-php${{ matrix.php }}
          path: php_vio-*_php${{ matrix.php }}-arm64-linux-glibc.zip

  # ── macOS x86_64 ──────────────────────────────────────────────────
  macos-x86_64:
    runs-on: macos-15
    strategy:
      matrix:
        php: ['8.4', '8.5']
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}

      - name: Install dependencies
        run: |
          brew install glfw glslang spirv-cross vulkan-loader vulkan-headers ffmpeg pkg-config

      - name: Build extension
        run: |
          phpize
          ./configure \
            --enable-vio \
            --with-glfw \
            --with-glslang \
            --with-spirv-cross \
            --with-vulkan \
            --with-ffmpeg \
            --with-metal
          make -j$(sysctl -n hw.ncpu)

      - name: Package binary
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}"
          strip -x modules/vio.so
          cd modules
          zip "../php_vio-${VERSION}_php${{ matrix.php }}-x86_64-darwin-bsdlibc.zip" vio.so

      - uses: actions/upload-artifact@v4
        with:
          name: vio-macos-x86_64-php${{ matrix.php }}
          path: php_vio-*_php${{ matrix.php }}-x86_64-darwin-bsdlibc.zip

  # ── macOS arm64 ───────────────────────────────────────────────────
  macos-arm64:
    runs-on: macos-15
    strategy:
      matrix:
        php: ['8.4', '8.5']
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}

      - name: Install dependencies
        run: |
          brew install glfw glslang spirv-cross vulkan-loader vulkan-headers ffmpeg pkg-config

      - name: Build extension
        run: |
          phpize
          ./configure \
            --enable-vio \
            --with-glfw \
            --with-glslang \
            --with-spirv-cross \
            --with-vulkan \
            --with-ffmpeg \
            --with-metal
          make -j$(sysctl -n hw.ncpu)

      - name: Run tests
        run: |
          NO_INTERACTION=1 TEST_PHP_EXECUTABLE=$(which php) \
            php run-tests.php -d extension=$PWD/modules/vio.so tests/ || true

      - name: Package binary
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}"
          strip -x modules/vio.so
          cd modules
          zip "../php_vio-${VERSION}_php${{ matrix.php }}-arm64-darwin-bsdlibc.zip" vio.so

      - uses: actions/upload-artifact@v4
        with:
          name: vio-macos-arm64-php${{ matrix.php }}
          path: php_vio-*_php${{ matrix.php }}-arm64-darwin-bsdlibc.zip

  # ── Windows x64 ──────────────────────────────────────────────────
  windows-x64:
    runs-on: windows-2022
    strategy:
      matrix:
        php: ['8.4', '8.5']
        ts: ['nts', 'ts']
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}

      - name: Setup PHP SDK
        id: php-sdk
        uses: php/setup-php-sdk@v0.12
        with:
          version: ${{ matrix.php }}
          arch: x64
          ts: ${{ matrix.ts }}

      - name: Download dependencies
        shell: cmd
        run: |
          mkdir deps
          curl -sSL -o deps\glfw.zip https://github.com/glfw/glfw/releases/download/3.4/glfw-3.4.bin.WIN64.zip
          7z x deps\glfw.zip -odeps\glfw-extract
          xcopy /E /I deps\glfw-extract\glfw-3.4.bin.WIN64\include deps\include
          xcopy /E /I deps\glfw-extract\glfw-3.4.bin.WIN64\lib-vc2022 deps\lib

      - name: Enable Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build extension
        shell: cmd
        run: |
          call phpize.bat
          call configure --enable-vio --with-glfw=deps --with-prefix=${{ steps.php-sdk.outputs.prefix }}
          nmake

      - name: Package binary
        shell: pwsh
        run: |
          $version = if ($env:GITHUB_REF_NAME) { $env:GITHUB_REF_NAME } else { "dev" }
          $dllPath = Get-ChildItem -Recurse -Filter "php_vio.dll" | Select-Object -First 1
          if (-not $dllPath) { $dllPath = Get-ChildItem -Recurse -Filter "vio.dll" | Select-Object -First 1 }
          # PIE format: php_vio-{version}-{phpver}-{ts|nts}-{compiler}-{arch}.zip
          $zipName = "php_vio-${version}-${{ matrix.php }}-${{ matrix.ts }}-vs17-x86_64.zip"
          Compress-Archive -Path $dllPath.FullName -DestinationPath $zipName

      - uses: actions/upload-artifact@v4
        with:
          name: vio-windows-x64-php${{ matrix.php }}-${{ matrix.ts }}
          path: php_vio-*-${{ matrix.php }}-${{ matrix.ts }}-vs17-x86_64.zip

  # ── Release ───────────────────────────────────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [linux-x86_64, linux-aarch64, macos-x86_64, macos-arm64, windows-x64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
